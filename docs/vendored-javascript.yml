# Vendored browser JavaScript inventory.
#
# Update this file whenever a third-party browser asset under js/ is added,
# removed, or replaced. Keep the SHA-256 values in sync by running:
#
#   ruby scripts/check-vendored-javascript.rb
#
schema_version: 1
owner: "Website maintainers"
review_cadence: "Review quarterly and whenever security advisories mention a listed package."
notes: >
  Vendored browser libraries are served directly from this repository instead of
  an npm lockfile. Replacements should use a reviewed upstream release, update
  the source URL and SHA-256 hash below, and receive browser smoke testing on
  the pages listed in each usage field.

vendored:
