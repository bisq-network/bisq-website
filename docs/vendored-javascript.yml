# Vendored browser JavaScript inventory.
#
# Update this file whenever a third-party browser asset under js/ is added,
# removed, or replaced. Keep the SHA-256 values in sync by running:
#
#   ruby scripts/check-vendored-javascript.rb
#
schema_version: 1
owner: "Website maintainers"
review_cadence: "Review quarterly and whenever security advisories mention a listed package."
notes: >
  Vendored browser libraries are served directly from this repository instead of
  an npm lockfile. Replacements should use a reviewed upstream release, update
  the source URL and SHA-256 hash below, and receive browser smoke testing on
  the pages listed in each usage field.

vendored:
  - path: "js/jquery-3.3.1.min.js"
    name: "jQuery"
    package: "jquery"
    version: "3.3.1"
    source_url: "https://code.jquery.com/jquery-3.3.1.min.js"
    license: "MIT"
    sha256: "a28ccf8a7b50522bdeea0cd83cdeca221c18fc1f9df3ee6b3d3c48d599206855"
    status: "loaded-site-wide"
    usage: "Loaded by _layouts/default.html on every generated page."
    update_cadence: "Review quarterly and on jQuery security advisories."

  - path: "js/bootstrap.min.js"
    name: "Bootstrap"
    package: "bootstrap"
    version: "4.2.1"
    source_url: "https://cdn.jsdelivr.net/npm/bootstrap@4.2.1/dist/js/bootstrap.min.js"
    license: "MIT"
    sha256: "eb795deda8983fa5310627c9584cf3f3b95d272567113500059018b3941cb267"
    status: "loaded-site-wide"
    usage: "Loaded by _layouts/default.html for navigation, dropdowns, and responsive UI behavior."
    update_cadence: "Review quarterly and on Bootstrap security advisories."

  - path: "js/bootstrap.min.js.map"
    name: "Bootstrap source map"
    package: "bootstrap"
    version: "4.2.1"
    source_url: "https://cdn.jsdelivr.net/npm/bootstrap@4.2.1/dist/js/bootstrap.min.js.map"
    license: "MIT"
    sha256: "749ebcf061a61181cb483dd0930c56873d2cd7ea01fb6d454684e0c2c7544444"
    status: "source-map"
    usage: "Referenced by js/bootstrap.min.js for debugging."
    update_cadence: "Keep in lockstep with js/bootstrap.min.js."

  - path: "js/popper.min.js"
    name: "Popper.js"
    package: "popper.js"
    version: "unknown 2018 v1 build"
    source_url: "unknown"
    license: "MIT"
    sha256: "6acc5eebfc83c2aabc8251d201df3004c6aaf801565a9e7d75196f2ac2b380c7"
    status: "loaded-site-wide"
    usage: "Loaded by _layouts/default.html before Bootstrap for dropdown and tooltip positioning."
    update_cadence: "Replace with a known upstream version during the next Bootstrap update."
    notes: "The file header omits an exact version; keep this gap visible until the file is replaced."

  - path: "js/js.cookie.min.js"
    name: "js-cookie"
    package: "js-cookie"
    version: "3.0.0-rc.0"
    source_url: "https://cdn.jsdelivr.net/npm/js-cookie@3.0.0-rc.0/dist/js.cookie.min.js"
    license: "MIT"
    sha256: "85e74cf367fdd70c3bdbb603df85574f4f7e9a99b6f77c3e0b4cee1c9fe5105c"
    status: "loaded-site-wide"
    usage: "Loaded by _layouts/default.html; used by js/theme-init.js and js/site.js for dark-mode persistence."
    update_cadence: "Review quarterly and on js-cookie security advisories."

  - path: "js/highstock.js"
    name: "Highstock"
    package: "highcharts"
    version: "6.2.0"
    source_url: "https://code.highcharts.com/6.2.0/highstock.js"
    license: "Highcharts license"
    sha256: "a0668ec0ff8ea34de5bd90526f1334c0dc1720705a985db0d65289235c037709"
    status: "loaded-dashboard"
    usage: "Loaded by dashboard.html; used by js/dashboard.js for the DAO supply chart."
    update_cadence: "Review quarterly and on Highcharts security advisories."

first_party:
  - path: "js/dashboard.js"
    usage: "DAO dashboard chart code loaded by dashboard.html."
  - path: "js/downloads.js"
    usage: "Downloads page release metadata helper loaded by _layouts/page_downloads.html."
  - path: "js/getting-started.js"
    usage: "Getting-started page interactions loaded by getting-started.html."
  - path: "js/home.js"
    usage: "Homepage OS detection and download tracking loaded by _layouts/page_home.html."
  - path: "js/page-dao.js"
    usage: "DAO page behavior loaded by _layouts/page_dao.html."
  - path: "js/site.js"
    usage: "Site-wide UI behavior loaded by _layouts/default.html."
  - path: "js/theme-init.js"
    usage: "Site-wide dark-mode initialization loaded by _layouts/default.html."
